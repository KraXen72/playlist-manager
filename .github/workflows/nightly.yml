name: Nightly build

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: pnpm

      - name: Install rpm tools
        run: sudo apt-get install -y rpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run dist:rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: dist/playlist-manager-*

  release:
    needs: build

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries-*/*
          body: |
            This is an automated nightly release built from the latest commit on `master`.
            It may be unstable.
          name: Nightly
          tag_name: nightly
          prerelease: true
